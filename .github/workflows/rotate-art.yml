name: Rotate profile art

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rotate-profile-art
  cancel-in-progress: true

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Select the current artwork
        run: python3 scripts/rotate_art.py

      - name: Publish only when the slot changes
        run: |
          if git diff --quiet && [ -z "$(git status --short --untracked-files=all)" ]; then
            exit 0
          fi

          git config user.name "raybytes-art[bot]"
          git config user.email "raybytes-art[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "art: rotate profile signal"
          git push
